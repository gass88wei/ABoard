name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Test
        run: npm run test

  build:
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Build Tauri app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run tauri build
      - name: Build + sign Tauri app (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run build:macos
      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: aboard-${{ matrix.os }}
          path: src-tauri/target/release/bundle/
          retention-days: 5

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: aboard-*
          merge-multiple: true
          path: bundles
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          # Only upload regular files (skip macOS .app bundle directory)
          FILES=$(find bundles -type f | tr '\n' ' ')
          gh release create "$TAG" $FILES \
            --title "$TAG" \
            --generate-notes
