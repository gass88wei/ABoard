name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find CI run for this commit
        id: find-ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(git rev-parse HEAD)
          RUN_ID=$(gh run list --workflow CI --branch main --limit 3 \
            --json databaseId,headSha,status,conclusion \
            --jq '.[] | select(.headSha=="'"$SHA"'" and .status=="completed" and .conclusion=="success") | .databaseId' \
            | head -1)
          if [ -z "$RUN_ID" ]; then
            echo "No successful CI run found for commit $SHA" >&2
            exit 1
          fi
          echo "run-id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Found CI run: $RUN_ID"

      - name: Download Windows bundles
        uses: actions/download-artifact@v4
        with:
          name: aboard-windows-latest
          path: bundles/windows
          run-id: ${{ steps.find-ci.outputs.run-id }}
          github-token: ${{ github.token }}

      - name: Download macOS bundles
        uses: actions/download-artifact@v4
        with:
          name: aboard-macos-latest
          path: bundles/macos
          run-id: ${{ steps.find-ci.outputs.run-id }}
          github-token: ${{ github.token }}

      - name: List bundles
        run: |
          echo "=== Windows ==="
          ls -la bundles/windows/ || echo "(empty)"
          echo "=== macOS ==="
          ls -la bundles/macos/ || echo "(empty)"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bundles/**/*
          generate_release_notes: true
